name: Build QMK firmware

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    name: QMK Userspace Build
    uses: qmk/.github/.github/workflows/qmk_userspace_build.yml@main
    with:
      qmk_repo: qmk/qmk_firmware
      qmk_ref: master

  publish:
    name: QMK Userspace Publish
    uses: qmk/.github/.github/workflows/qmk_userspace_publish.yml@main
    if: always() && !cancelled()
    needs: build

  keymap-json:
    name: Generate Keymap JSON
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli:latest

    steps:
      - name: Checkout Userspace
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          submodules: recursive

      - name: Checkout QMK Firmware
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
          path: qmk_firmware
          repository: qmk/qmk_firmware
          ref: master
          submodules: recursive

      - name: Install QMK CLI dependencies
        run: pip install -r qmk_firmware/requirements.txt

      - name: Configure QMK CLI
        run: |
          qmk config user.qmk_home=$GITHUB_WORKSPACE/qmk_firmware
          qmk config user.overlay_dir=$GITHUB_WORKSPACE

      - name: Generate keymap JSON
        run: |
          mkdir -p generated
          qmk c2json \
            -kb zsa/voyager \
            -km zwang695 \
            -o generated/zsa_voyager_zwang695_keymap.json \
            keyboards/zsa/voyager/keymaps/zwang695/keymap.c
          qmk format-json generated/zsa_voyager_zwang695_keymap.json

      - name: Upload keymap JSON
        uses: actions/upload-artifact@v7
        with:
          name: Keymap JSON
          path: generated/zsa_voyager_zwang695_keymap.json
