name: Generate keymap diagram

on:
  push:
    branches: [main]
    paths:
      - "keyboards/zsa/voyager/keymaps/zwang695/**"
      - "scripts/draw-keymap.sh"
      - ".github/workflows/generate_diagram.yaml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagram:
    name: Generate diagram
    runs-on: ubuntu-latest

    steps:
      - name: Check out userspace
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install diagram tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install qmk keymap-drawer

      - name: Set up ZSA QMK
        run: |
          qmk setup -y -b firmware25 zsa/qmk_firmware
          qmk config user.overlay_dir="$GITHUB_WORKSPACE"

      - name: Generate diagram
        run: scripts/draw-keymap.sh

      - name: Commit diagram updates
        run: |
          if git diff --quiet -- docs/keymap.yaml docs/keymap.svg; then
            echo "Diagram files are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/keymap.yaml docs/keymap.svg
          git commit -m "Regenerate keymap diagram"
          git push
