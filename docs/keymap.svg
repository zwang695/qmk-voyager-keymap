<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="1760" viewBox="0 0 1420 1760">
  <style>
    .bg { fill: #f7f7f2; }
    .title { font: 700 26px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #202124; }
    .layer { font: 700 20px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #174ea6; }
    .row { font: 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #202124; }
    .note { font: 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #5f6368; }
  </style>
  <rect class="bg" width="1420" height="1760"/>
  <text class="title" x="32" y="44">ZSA Voyager Keymap</text>
  <text class="note" x="32" y="72">Compact generated fallback diagram. Re-run scripts/draw-keymap.sh with keymap-drawer for the full rendered layout.</text>

  <text class="layer" x="32" y="120">Base</text>
  <text class="row" x="32" y="150">+        1        2        3        4        5          6        7        8        9        0        -</text>
  <text class="row" x="32" y="174">TAB      Q        W        E        R        T          Y        U        I        O        P        \</text>
  <text class="row" x="32" y="198">ESC      A/CTL    S/OPT    D/CMD    F/SFT    G/CAG      H/CAG    J/SFT    K/CMD    L/OPT    ;/CTL    '</text>
  <text class="row" x="32" y="222">Magic    Z        X        C        V        B          N        M        ,        .        /        CapsWord</text>
  <text class="row" x="32" y="246">                           RET/Cursor       BSPC/Symbol                  _/Symbol        Space/Num</text>

  <text class="layer" x="32" y="306">Cursor</text>
  <text class="row" x="32" y="336">TRNS     TRNS     TRNS     TRNS     TRNS     TRNS       TRNS     TRNS     TRNS     TRNS     TRNS     TRNS</text>
  <text class="row" x="32" y="360">TRNS     Cmd+R    PrevTab  NextTab  Cmd+[    Cmd+]      PgUp     Home     Up       End      Search   TRNS</text>
  <text class="row" x="32" y="384">TRNS     LCTL     LALT     LGUI     LSFT     Click      PgDn     Left     Down     Right    AreaCopy TRNS</text>
  <text class="row" x="32" y="408">TRNS     Cmd+Z    Redo     Cmd+C    Cmd+V    Cmd+Sft+V  Cmd+L    SelBack  SelWord  SelLine  ScrCopy  TRNS</text>
  <text class="row" x="32" y="432">                           TRNS             TRNS                         CycleTab        LayerLock</text>

  <text class="layer" x="32" y="492">Symbol</text>
  <text class="row" x="32" y="522">TRNS     TRNS     TRNS     TRNS     TRNS     TRNS       TRNS     TRNS     TRNS     TRNS     TRNS     TRNS</text>
  <text class="row" x="32" y="546">TRNS     `        &lt;        &gt;        -        |          ^        {        }        $        -&gt;       TRNS</text>
  <text class="row" x="32" y="570">TRNS     !        *        /        =        &amp;          #        (        )        ;        &quot;        TRNS</text>
  <text class="row" x="32" y="594">TRNS     ~        +        [        ]        %          @        :        ,        .        '        TRNS</text>
  <text class="row" x="32" y="618">                           TRNS             TRNS                         TRNS            TRNS</text>

  <text class="layer" x="32" y="678">Num</text>
  <text class="row" x="32" y="708">ESC      F1       F2       F3       F4       F5         F6       F7       F8       F9       F10      F11</text>
  <text class="row" x="32" y="732">NO       /        9        8        7        *          NO       NO       [        ]        NO       F12</text>
  <text class="row" x="32" y="756">NO       -        3        2        1        +          CAG      RSFT     RGUI     RALT     RCTL     NO</text>
  <text class="row" x="32" y="780">NO       X        6        5        4        %          NO       NO       ,        .        NO       NO</text>
  <text class="row" x="32" y="804">                           0                NO                           LayerLock       NO</text>

  <text class="layer" x="32" y="864">Magic</text>
  <text class="row" x="32" y="894">TRNS     TRNS     TRNS     TRNS     TRNS     TRNS       RM_TOGG  QK_KB    RM_NEXT  RGB_SLD  RM_VALD  RM_VALU</text>
  <text class="row" x="32" y="918">TRNS     MPrev    MNext    MStop    MPlay    TRNS       TRNS     TRNS     TRNS     HSV0     HSV74    HSV169</text>
  <text class="row" x="32" y="942">TRNS     VolDn    VolUp    Mute     TRNS     TRNS       TRNS     TRNS     TRNS     TRNS     TRNS     TRNS</text>
  <text class="row" x="32" y="966">TRNS     TRNS     TRNS     TRNS     TRNS     TRNS       TRNS     TRNS     TRNS     TRNS     TRNS     Boot</text>
  <text class="row" x="32" y="990">                           TRNS             TRNS                         TRNS            TRNS</text>

  <text class="layer" x="32" y="1050">Mouse</text>
  <text class="row" x="32" y="1080">NO       NO       NO       NO       NO       NO         NO       NO       NO       NO       NO       NO</text>
  <text class="row" x="32" y="1104">MouseOff Drag     Scroll   CPI-     CPI+     NO         NO       NO       NO       NO       NO       NO</text>
  <text class="row" x="32" y="1128">ESC      OSM CTL  OSM ALT  OSM GUI  OSM SFT  BackBtn    NO       CPI+     CPI-     Scroll   NO       NO</text>
  <text class="row" x="32" y="1152">NO       Cmd+Z    Cmd+X    Cmd+C    Cmd+V    FwdBtn     NO       NO       NO       NO       NO       NO</text>
  <text class="row" x="32" y="1176">                           Click            RightClick                    LayerLock       NO</text>

  <text class="note" x="32" y="1240">MouseOff is on the same physical key as Base TAB. Magic is intentionally unchanged.</text>
</svg>
